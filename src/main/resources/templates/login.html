<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>로그인 - Azit</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background-color: #f4f4f4;
      }
      .login-container {
        background: white;
        padding: 2rem;
        border-radius: 8px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        width: 300px;
      }
      h2 {
        text-align: center;
        color: #333;
      }
      .form-group {
        margin-bottom: 1rem;
      }
      label {
        display: block;
        margin-bottom: 0.5rem;
      }
      input {
        width: 100%;
        padding: 0.5rem;
        border: 1px solid #ddd;
        border-radius: 4px;
        box-sizing: border-box;
      }
      button {
        width: 100%;
        padding: 0.7rem;
        background-color: #007bff;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        margin-top: 1rem;
      }
      button:hover {
        background-color: #0056b3;
      }
      .error {
        color: red;
        font-size: 0.8rem;
        margin-top: 0.5rem;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="login-container">
      <h2>Azit 로그인</h2>
      <form th:action="@{/login}" method="post">
        <div class="form-group">
          <label for="username">이메일</label>
          <input
            type="email"
            id="username"
            name="username"
            placeholder="example@email.com"
            required
          />
        </div>
        <div class="form-group">
          <label for="password">비밀번호</label>
          <input type="password" id="password" name="password" required />
        </div>
        <button type="submit">로그인</button>
        <div th:if="${param.error}" class="error">
          로그인 정보가 올바르지 않습니다.
        </div>
      </form>
      <div style="text-align: center; margin-top: 1.5rem; font-size: 0.85rem">
        아직 회원이 아니신가요?
        <a href="/register" style="color: #007bff; text-decoration: none"
          >회원가입하기</a
        >
      </div>
    </div>
  </body>
</html>
