<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>Admin - Tech Stacks</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand" href="/">AZIT ADMIN</a>
        <div class="navbar-nav ms-auto">
          <span class="nav-link text-light" th:text="${#authentication.name}"
            >AdminName</span
          >
          <a class="nav-link" href="/">Back to Site</a>
        </div>
      </div>
    </nav>

    <div class="container mt-5">
      <h2>Tech Stack Management</h2>
      <hr />

      <!-- Add New Stack Form -->
      <div class="card mb-4">
        <div class="card-body">
          <form
            th:action="@{/admin/stacks/add}"
            method="post"
            class="row gx-3 gy-2 align-items-center"
          >
            <div class="col-sm-4">
              <label class="visually-hidden" for="stackName">Stack Name</label>
              <input
                type="text"
                class="form-control"
                id="stackName"
                name="stackName"
                placeholder="Stack Name (e.g. Java)"
                required
              />
            </div>
            <div class="col-sm-5">
              <label class="visually-hidden" for="iconUrl">Icon URL</label>
              <input
                type="url"
                class="form-control"
                id="iconUrl"
                name="iconUrl"
                placeholder="Image URL (Optional)"
              />
            </div>
            <div class="col-auto">
              <button type="submit" class="btn btn-primary">Add Stack</button>
            </div>
          </form>
        </div>
      </div>

      <!-- Stack List -->
      <table class="table table-bordered table-hover align-middle">
        <thead class="table-light">
          <tr>
            <th style="width: 10%">ID</th>
            <th style="width: 15%">Icon</th>
            <th style="width: 55%">Stack Name</th>
            <th style="width: 20%">Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="stack : ${stacks}">
            <td th:text="${stack.id}">1</td>
            <td>
              <img
                th:if="${stack.iconUrl != null}"
                th:src="${stack.iconUrl}"
                alt="icon"
                style="width: 24px; height: 24px"
              />
              <span
                th:unless="${stack.iconUrl != null}"
                class="text-muted small"
                >No Icon</span
              >
            </td>
            <td th:text="${stack.stackName}">Java</td>
            <td>
              <form
                th:action="@{/admin/stacks/delete/{id}(id=${stack.id})}"
                method="post"
                onsubmit="return confirm('진짜 삭제하시겠습니까?');"
              >
                <button type="submit" class="btn btn-danger btn-sm">
                  Delete
                </button>
              </form>
            </td>
          </tr>
          <tr th:if="${#lists.isEmpty(stacks)}">
            <td colspan="4" class="text-center text-muted">
              등록된 기술 스택이 없습니다.
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </body>
</html>
