<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>회원가입 - Azit</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background-color: #f4f4f4;
        margin: 0;
      }
      .register-container {
        background: white;
        padding: 2.5rem;
        border-radius: 12px;
        box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
        width: 350px;
      }
      h2 {
        text-align: center;
        color: #333;
        margin-bottom: 2rem;
      }
      .form-group {
        margin-bottom: 1.2rem;
      }
      label {
        display: block;
        margin-bottom: 0.5rem;
        color: #555;
        font-size: 0.9rem;
      }
      input {
        width: 100%;
        padding: 0.7rem;
        border: 1px solid #ccc;
        border-radius: 6px;
        box-sizing: border-box;
        transition: border-color 0.2s;
      }
      input:focus {
        border-color: #007bff;
        outline: none;
      }
      button {
        width: 100%;
        padding: 0.8rem;
        background-color: #28a745;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        margin-top: 1.5rem;
        font-size: 1rem;
        font-weight: bold;
      }
      button:hover {
        background-color: #218838;
      }
      .login-link {
        text-align: center;
        margin-top: 1.5rem;
        font-size: 0.85rem;
      }
      .login-link a {
        color: #007bff;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <div class="register-container">
      <h2>Azit 회원가입</h2>
      <form th:action="@{/register}" method="post">
        <div class="form-group">
          <label for="email">이메일 (ID로 사용)</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="example@email.com"
            required
          />
        </div>
        <div class="form-group">
          <label for="name">성함 (실명)</label>
          <input
            type="text"
            id="name"
            name="name"
            placeholder="실명을 입력하세요"
            required
          />
        </div>
        <div class="form-group">
          <label for="age">나이</label>
          <input
            type="number"
            id="age"
            name="age"
            placeholder="나이를 입력하세요"
          />
        </div>
        <div class="form-group">
          <label for="bio">자기소개</label>
          <textarea
            id="bio"
            name="bio"
            placeholder="간단한 자기소개를 입력하세요"
            style="
              width: 100%;
              padding: 0.7rem;
              border: 1px solid #ccc;
              border-radius: 6px;
              box-sizing: border-box;
              font-family: inherit;
            "
          ></textarea>
        </div>
        <div class="form-group">
          <label for="password">비밀번호</label>
          <input type="password" id="password" name="password" required />
        </div>
        <button type="submit">회원가입 완료</button>
      </form>
      <div class="login-link">
        이미 계정이 있으신가요? <a href="/login">로그인하기</a>
      </div>
    </div>
  </body>
</html>
